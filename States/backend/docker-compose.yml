version: "3.9"

services:
  postgres:
    image: postgres:15-alpine
    container_name: hospital_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: hospital_db
      POSTGRES_USER: hospital
      POSTGRES_PASSWORD: hospital123
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hospital -d hospital_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: .
    container_name: hospital_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: hospital
      DB_PASSWORD: hospital123
      DB_NAME: hospital_db
      JWT_SECRET: hospital-super-secret-jwt-key-change-in-production
      PORT: 8080
    ports:
      - "8080:8080"

volumes:
  postgres_data:
